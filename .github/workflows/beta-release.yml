name: Release to Beta
on:
  push:
    tags:
      - 'v*.*.*-beta*'
      - '*.*.*-beta*'
      - 'v*.*.*-alpha*'
      - '*.*.*-alpha*'

permissions:
  contents: write

jobs:
  beta-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Build single script from modules
        run: bash build.sh

      - name: Install shc
        run: |
          sudo add-apt-repository ppa:neurobin/ppa -y
          sudo apt-get update
          sudo apt-get install -y shc

      - name: Compile script to binary (statically linked)
        run: |
          CFLAGS="-static" shc -r -f dist/PVE-Tools.sh -o pve-tools
          chmod +x pve-tools

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.TAG }}
          name: Beta Release ${{ steps.get_version.outputs.TAG }}
          body: |
            ## Beta 版本 ${{ steps.get_version.outputs.VERSION }}
            
            ⚠️ 这是测试版本，可能存在不稳定因素，请勿在生产环境使用
            
            ## 安装方式
            
            **方式一：直接运行脚本 (推荐)**
            ```bash
            bash -c "$(curl -fsSL https://raw.githubusercontent.com/PVE-Tools/PVE-Tools-9/beta/dist/PVE-Tools.sh)"
            ```
            
            **方式二：下载二进制文件**
            ```bash
            chmod +x pve-tools
            ./pve-tools
            ```
          files: |
            pve-tools
            dist/PVE-Tools.sh
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
